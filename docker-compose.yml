# GAIA Distributed Runtime — v0.5
# Three-node epistemic network.
# Each node is an independent FastAPI server with its own world state.
# Nodes sync over the internal Docker network.
#
# Run:
#   docker-compose build
#   docker-compose up
#
# Submit a claim to Node A:
#   curl -X POST http://localhost:8001/claim \
#     -H "Content-Type: application/json" \
#     -d '{"statement": "The sky is blue", "confidence": 0.9}'
#
# Check if it propagated to Node B:
#   curl http://localhost:8002/state

version: "3.9"

services:

  gaia-node-a:
    build: .
    ports:
      - "8001:8000"
    environment:
      - NODE_ID=A
      - NODE_DOMAIN=biophotonics
      - NODE_TRUST=0.90
      - PEERS=http://gaia-node-b:8000,http://gaia-node-c:8000
    volumes:
      - ./data/node-a:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  gaia-node-b:
    build: .
    ports:
      - "8002:8000"
    environment:
      - NODE_ID=B
      - NODE_DOMAIN=architecture
      - NODE_TRUST=0.85
      - PEERS=http://gaia-node-a:8000,http://gaia-node-c:8000
    volumes:
      - ./data/node-b:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  gaia-node-c:
    build: .
    ports:
      - "8003:8000"
    environment:
      - NODE_ID=C
      - NODE_DOMAIN=epistemics
      - NODE_TRUST=0.88
      - PEERS=http://gaia-node-a:8000,http://gaia-node-b:8000
    volumes:
      - ./data/node-c:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
