# Alembic Configuration File
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
script_location = alembic

# Prepend sys.path with this string (comma-separated) to find your app code.
prepend_sys_path = .

# Template used to generate migration file names.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Truncate slug to this length.
truncate_slug_length = 40

# Timezone for file timestamps (leave blank for UTC).
timezone =

# Set to 'true' to run the environment during the 'revision' command,
# regardless of whether autogenerate is used.
revision_environment = false

# Set to 'true' to allow .pyc files without a source .py file.
sourceless = false

# Version path separator.  Use os, space, or newline.
version_path_separator = os

# Output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# The database URL is read from the environment at runtime (see env.py).
# Do NOT hard-code credentials here.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Uncomment to run black on new migration files:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
