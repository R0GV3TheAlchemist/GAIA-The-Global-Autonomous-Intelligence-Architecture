[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gaia-app"
version = "0.1.0"
description = "GAIA-APP Python core and canon runtime"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.110.0",
  "uvicorn[standard]>=0.29.0",
  "pydantic>=2.0.0",
  "python-dotenv>=1.0.0",
  "httpx>=0.27.0",
  "PyJWT>=2.8.0",
  "numpy>=1.26.0",
  "scipy>=1.13.0",
  "trafilatura>=1.8.0",
  "beautifulsoup4>=4.12.0",
  "lxml>=5.0.0",
  "openai>=1.20.0",
  "anthropic>=0.25.0"
]

[project.scripts]
gaia = "gaia.cli:main"

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "pytest-asyncio>=0.23.6,<1.0",
  "pytest-timeout>=2.3.0",
  "pytest-mock>=3.14.0",
  "ruff>=0.5.0",
  "mypy>=1.10.0",
  "pre-commit>=3.7.0"
]
# Local/research only — do NOT install in CI (requires ~1-2 GB PyTorch)
ml = [
  "sentence-transformers>=2.2.0"
]

[tool.pytest.ini_options]
# ── Paths ──────────────────────────────────────────────────────────────────
pythonpath = [".", "core", "src-python"]

# ── Async ──────────────────────────────────────────────────────────────────
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"

# ── Guards ─────────────────────────────────────────────────────────────────
timeout = 60

# ── Test discovery ─────────────────────────────────────────────────────────
testpaths = ["tests"]

# ============================================================================
# RUFF — Linter + Formatter
# Philosophy: signal over noise. Real bugs loud; style gentle; soul-layer free.
# ============================================================================
[tool.ruff]
line-length = 100
target-version = "py311"

# First-party source roots — resolves `from core.xxx import ...` correctly.
src = [".", "core", "src-python"]

# Dirs never linted (generated, vendored, notebooks, migrations)
extend-exclude = [
  ".venv",
  "venv",
  "__pycache__",
  "*.egg-info",
  "dist",
  "build",
  "migrations",
  "*.ipynb",
  "canon/generated",
  "core/canon/generated",
]

[tool.ruff.lint]
# Rule sets — signal-ordered for GAIA-OS
# E/W  — pycodestyle errors/warnings
# F    — Pyflakes (unused imports, undefined names)
# I    — isort (import ordering)
# N    — pep8-naming
# B    — flake8-bugbear (likely bugs)
# C4   — flake8-comprehensions
# SIM  — flake8-simplify
# UP   — pyupgrade (modernise syntax — selectively ignored below)
# S    — flake8-bandit (security)
# RUF  — Ruff-native rules
select = ["E", "W", "F", "I", "N", "B", "C4", "SIM", "UP", "S", "RUF"]

preview = true

ignore = [
  # ── Style / formatting ──────────────────────────────────────────────
  # E501: line too long — formatter handles at line-length=100.
  # Canon docs and soul-layer symbolic expressions need the space.
  "E501",

  # ── Type annotation modernisation (UP04x) ───────────────────────────
  # UP045: Optional[X] → X|None  ← THE MAIN ECHO SOURCE (~800 instances)
  # UP007: Optional[X]/Union[X,Y] → X|None/X|Y
  # UP006: List/Dict/Tuple → list/dict/tuple
  # UP035: typing imports deprecated in 3.9+
  # UP038: isinstance(x, (A, B)) → isinstance(x, A | B)
  # These are cosmetic modernisations, NOT bugs. Auto-fix in one pass
  # when ready: ruff check . --select UP006,UP007,UP035,UP038,UP045 --fix
  "UP045",
  "UP007",
  "UP006",
  "UP035",
  "UP038",

  # ── Annotation rules ────────────────────────────────────────────────
  # ANN: type annotations — relaxed globally during rapid Phase C dev.
  # Re-enable per-module once API stabilises post-sprint.
  "ANN001", "ANN002", "ANN003", "ANN101", "ANN102",
  "ANN201", "ANN202", "ANN204", "ANN205", "ANN206",

  # ── Ruff-native ─────────────────────────────────────────────────────
  # RUF012: mutable class-var annotation — intentional in engine state containers.
  "RUF012",
  # RUF059: unpacked variable unused — too noisy in router pattern matching.
  "RUF059",

  # ── Bugbear ─────────────────────────────────────────────────────────
  # B905: zip() without strict= — too noisy during rapid iteration.
  "B905",

  # ── Simplify ────────────────────────────────────────────────────────
  # SIM108: ternary vs if-else — explicit form clearer in multi-branch logic.
  "SIM108",

  # ── Security ────────────────────────────────────────────────────────
  # S101: assert — soul-layer runtime guards use assert intentionally.
  # Overridden per-file for tests below.
  "S101",
  # S311: random — used in resonance/schumann modules for field modelling,
  # not cryptography. Bandit doesn't know the difference.
  "S311",
]

[tool.ruff.lint.per-file-ignores]
# ── Init files: wildcard re-exports are intentional ─────────────────────────
"**/__init__.py" = ["F401", "F403", "F811"]

# ── Test files: asserts required, bandit too strict for fixtures ─────────────
"tests/**/*.py"                = ["S101", "S105", "S106", "S311", "ANN", "D", "N802", "F401"]
"tests/soul_mirror/**/*.py"    = ["S101", "S105", "S106", "S311", "ANN", "D", "N802", "F401"]
"tests/governance/**/*.py"     = ["S101", "S105", "S106", "S311", "ANN", "D", "N802", "F401"]

# ── Quantum chemistry: research code, pyscf/qiskit imports are conditional ───
"src-python/quantum_chemistry/**/*.py" = ["F401", "F811", "S101", "N803", "N806"]
"src-python/sovereign_memory/**/*.py" = ["F401", "F811"]
"src-python/**/__init__.py"           = ["F401", "F403", "F811"]

# ── API layer: re-exports + conditional imports are intentional ──────────────
"api/**/*.py" = ["F401"]

# ── Core modules with conditional/guarded imports ───────────────────────────
"core/codex_stage_engine.py"       = ["F401"]
"core/crystal_mineral_database.py" = ["F401"]
"core/gcp_sensor.py"               = ["F401"]
"core/governance/explainability.py" = ["F401"]
"core/governance/halt_controller.py" = ["F401"]

# ── Soul-layer / consciousness / resonance engines ───────────────────────────
# These modules have inherently high McCabe complexity — multi-branch state
# machines, emotional arc logic, symbolic pattern matching. Not bugs.
"core/soul_mirror_engine.py"    = ["C901", "PLR0912", "PLR0915"]
"core/shadow_integration.py"    = ["C901", "PLR0912", "PLR0915"]
"core/shadow_engine.py"         = ["C901", "PLR0912", "PLR0915"]
"core/transpersonal_engine.py"  = ["C901", "PLR0912", "PLR0915"]
"core/individuation.py"         = ["C901", "PLR0912", "PLR0915"]
"core/dream_weaver.py"          = ["C901", "PLR0912", "PLR0915"]
"core/gaian_runtime.py"         = ["C901", "PLR0912", "PLR0915"]
"core/agentic_loop.py"          = ["C901", "PLR0912", "PLR0915"]
"core/affect_inference.py"      = ["C901", "PLR0912", "PLR0915"]
"core/canon_graph.py"           = ["C901", "PLR0912", "PLR0915"]
"core/cultural_calibration.py" = ["C901", "PLR0912", "PLR0915"]
"core/mineral_profile.py"       = ["C901", "PLR0912", "PLR0915"]
"core/somatic_interface.py"     = ["C901", "PLR0912", "PLR0915"]
"core/alchemical_pipeline.py"   = ["C901", "PLR0912", "PLR0915"]
"core/emotional_arc.py"         = ["C901", "PLR0912", "PLR0915"]
"core/emotional_codex.py"       = ["C901", "PLR0912", "PLR0915"]
"core/resonance_field_engine.py" = ["C901", "PLR0912", "PLR0915"]
"core/schumann_alignment.py"    = ["C901", "PLR0912", "PLR0915"]
"core/gaian_birth.py"           = ["C901", "PLR0912", "PLR0915"]
"core/gaian_identity.py"        = ["C901", "PLR0912", "PLR0915"]
"core/consent_ledger.py"        = ["C901", "PLR0912", "PLR0915"]
"core/inference_router.py"      = ["C901", "PLR0912", "PLR0915"]

[tool.ruff.lint.mccabe]
# Default 10 → raised to 15. Soul-layer modules exempted further above.
max-complexity = 15

[tool.ruff.lint.isort]
known-first-party = ["core", "gaia", "api"]
split-on-trailing-comma = true
force-sort-within-sections = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false

[tool.setuptools.packages.find]
include = ["core*", "api*", "gaia*"]
