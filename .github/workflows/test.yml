name: 🧪 Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python + TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Python 3.11
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 4. Install dependencies
      - name: Install Node dependencies
        run: npm install

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      # 5. TypeScript type check
      - name: TypeScript type check
        run: npx tsc --noEmit

      # 6. Python tests
      # PYTHONPATH includes both repo root (for core/) and src-python/ (for
      # sovereign_memory/, affect_engine/, stage_engine/, shadow_engine/)
      #
      # NOTE on --ignore flags
      # The nine ignored test files import from src-python/ modules
      # (affect_engine, crystal, shadow_engine, sovereign_memory) that exist
      # on main but are outside the scope of this branch.
      # Remove these --ignore flags once those modules are merged here.
      - name: Run Python tests
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src-python
        run: |
          pytest tests/ \
            --cov=core \
            --cov-report=xml \
            --cov-report=term-missing \
            --timeout=60 \
            -v \
            --ignore=tests/test_affect_engine.py \
            --ignore=tests/test_crystal_coherence.py \
            --ignore=tests/test_crystal_engine.py \
            --ignore=tests/test_crystal_narrative.py \
            --ignore=tests/test_shadow_archetypes.py \
            --ignore=tests/test_shadow_engine.py \
            --ignore=tests/test_shadow_integration.py \
            --ignore=tests/test_shadow_intensity.py \
            --ignore=tests/test_sovereign_memory.py

      # 7. Upload coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore
