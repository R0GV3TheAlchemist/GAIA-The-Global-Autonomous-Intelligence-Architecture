# .github/workflows/error-correction-scan.yml
# GAIA — The Global Autonomous Intelligence Architecture
# Copyright (c) 2026 R0GV3 The Alchemist
#
# Runs the GAIA Error Correction Detection Engine (Phase 1b) on every
# pull request targeting main or release branches.
#
# What it does:
#   1. Runs ErrorDetector (Ruff + Canon Rule Checker — no auto-fix)
#   2. Writes error_report.md + error_report.json via ErrorReporter
#   3. Uploads both as a workflow artifact (retained 30 days)
#   4. Posts a concise summary table as a PR comment (updates on re-run)
#   5. Fails the job ONLY if CRITICAL or HIGH severity findings exist
#
# Canon Ref: C01 (Sovereignty), C30 (No silent failures), Issue #755

name: "🔍 Error Correction Scan"

on:
  pull_request:
    branches:
      - main
      - "release/**"
  workflow_dispatch:

jobs:
  error-correction-scan:
    name: "Error Correction — Phase 1b Detection (Ruff + Canon)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e . --no-deps 2>/dev/null || true

      - name: Run Error Correction Detector (Ruff + Canon)
        id: detector
        run: |
          python - <<'EOF'
          import json
          import sys
          from pathlib import Path
          from core.error_correction import ErrorDetector, ErrorReporter

          repo_root  = Path(".")
          output_dir = Path("reports/error-correction")

          print("=" * 60)
          print("GAIA Error Correction Detection Engine — Phase 1b")
          print("Sources: Ruff + Canon Rule Checker")
          print("=" * 60)

          detector = ErrorDetector(repo_root=repo_root)
          findings = detector.run()

          reporter = ErrorReporter(output_dir=output_dir, repo_name="GAIA")
          paths    = reporter.write(findings)

          blocking = [f for f in findings if f.is_blocking()]
          total    = len(findings)
          files    = len({f.file_path for f in findings})

          # Source breakdown
          by_source: dict[str, int] = {}
          for f in findings:
              by_source[f.source] = by_source.get(f.source, 0) + 1

          print(f"\nTotal findings : {total}")
          print(f"Blocking        : {len(blocking)}")
          print(f"Files affected  : {files}")
          for src, count in sorted(by_source.items()):
              print(f"  [{src}] {count} finding(s)")
          print(f"\nMarkdown report : {paths['markdown']}")
          print(f"JSON artifact   : {paths['json']}")

          with open("reports/error-correction/run_summary.json", "w") as fh:
              json.dump({
                  "total":    total,
                  "blocking": len(blocking),
                  "files":    files,
                  "by_source": by_source,
              }, fh)

          if blocking:
              print(f"\n❌ {len(blocking)} BLOCKING finding(s) (CRITICAL or HIGH).")
              for f in blocking[:5]:
                  print(f"  [{f.severity.value.upper()}] {f.rule_id} @ {f.location_str()}: {f.message[:80]}")
              sys.exit(1)
          else:
              print(f"\n✅ No blocking findings. {total} low-severity finding(s) noted.")
          EOF
        continue-on-error: true

      - name: Upload Error Correction Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-correction-reports
          path: reports/error-correction/
          retention-days: 30

      - name: Post PR summary comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let total = '?', blocking = '?', files = '?';
            let bySource = {};
            const summaryPath = 'reports/error-correction/run_summary.json';
            if (fs.existsSync(summaryPath)) {
              const s = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
              total    = s.total;
              blocking = s.blocking;
              files    = s.files;
              bySource = s.by_source || {};
            }

            const status = blocking === 0
              ? '✅ PASSED'
              : `❌ BLOCKED (${blocking} critical/high)`;

            let sourceRows = '';
            for (const [src, count] of Object.entries(bySource)) {
              const label = src === 'ruff' ? '🔍 Ruff' : '⚖️ Canon Checker';
              sourceRows += `| ${label} | ${count} |\n`;
            }

            let topFindings = '';
            const jsonPath = 'reports/error-correction/error_report.json';
            if (fs.existsSync(jsonPath)) {
              const data = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
              const blockers = data.findings
                .filter(f => f.severity === 'critical' || f.severity === 'high')
                .slice(0, 10);
              if (blockers.length > 0) {
                topFindings = `\n### ❌ Blocking Findings\n\n`;
                topFindings += `| Severity | Rule | Source | Location | Message |\n`;
                topFindings += `|----------|------|--------|----------|---------|\n`;
                for (const f of blockers) {
                  const sev = f.severity === 'critical' ? '🔴 critical' : '🟠 high';
                  topFindings += `| ${sev} | \`${f.rule_id}\` | ${f.source} | \`${f.location}\` | ${f.message.slice(0,80)} |\n`;
                }
                if (blocking > 10) topFindings += `\n> … and ${blocking - 10} more. See artifact.\n`;
              }
            }

            const body = [
              `## 🔍 GAIA Error Correction Scan — ${status}`,
              ``,
              `| Metric | Value |`,
              `|--------|-------|`,
              `| Total findings | ${total} |`,
              `| 🔴🟠 Blocking (CRITICAL + HIGH) | ${blocking} |`,
              `| Files affected | ${files} |`,
              ``,
              `### By Source`,
              `| Source | Findings |`,
              `|--------|----------|`,
              sourceRows,
              topFindings,
              `> Full reports in **error-correction-reports** artifact.`,
              `> _Canon Ref: C01, C15, C30 — Issue #755 Phase 1b_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('Error Correction Scan')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      - name: Enforce — fail on blocking findings
        if: steps.detector.outcome == 'failure'
        run: |
          echo ""
          echo "❌ Error Correction Scan FAILED."
          echo "   CRITICAL or HIGH findings detected (Ruff or Canon Rule Checker)."
          echo "   See 'error-correction-reports' artifact for details."
          echo ""
          exit 1
