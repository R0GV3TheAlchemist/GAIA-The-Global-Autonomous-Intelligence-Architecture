name: Security Scan
# Runs on Pull Requests only to preserve free-plan Actions minutes.
# Also runs on a weekly schedule for ongoing dependency monitoring.
#
# NOTE: CodeQL requires GitHub Advanced Security (paid plan or public repo).
# It has been removed. Use pip-audit for dependency CVE scanning instead.

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit dependencies
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt
