name: Ruff Autofix

on:
  # Manual trigger only — run from the Actions tab when you want to
  # batch-apply auto-fixable ruff issues across the codebase.
  # Do NOT run on push: that causes the bot commit to become HEAD
  # on main, which suppresses CI check reporting.
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff autofix
        run: ruff check --fix . || true

      - name: Commit fixes (skip if nothing changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: ruff --fix autofix"
          git push
