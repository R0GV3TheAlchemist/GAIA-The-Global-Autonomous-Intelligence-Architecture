# Auto-fix Ruff Lint & Format
# STATUS: DISABLED — was creating a push loop with ci.yml.
# The autofix bot committed --unsafe-fixes back to main on every push,
# which re-triggered ci.yml, causing a perpetual red loop.
#
# To re-enable: change the 'on:' trigger below from 'workflow_dispatch' only
# back to also include 'push: branches: [main]' AFTER the ruff baseline is clean
# and the [tool.ruff] config in pyproject.toml is locked down.

name: Auto-fix Ruff Lint & Format

on:
  workflow_dispatch:  # manual trigger only — disabled from auto-running on push

jobs:
  autofix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      # Safe fixes only — no --unsafe-fixes to avoid mangling code logic
      - name: ruff check --fix (safe only)
        run: ruff check core/ api/ gaia/ --fix || true

      - name: ruff format
        run: ruff format core/ api/ gaia/ || true

      - name: Commit & push fixes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet \
            && echo "✅ Nothing to fix — repo is already clean." \
            || git commit -m "fix(lint): auto-fix safe ruff violations + ruff format"
          git diff --cached --quiet || git push
