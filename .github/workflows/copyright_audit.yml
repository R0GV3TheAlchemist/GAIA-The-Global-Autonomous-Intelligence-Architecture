# .github/workflows/copyright_audit.yml
# GAIA — The Global Autonomous Intelligence Architecture
# Copyright (c) 2026 R0GV3 The Alchemist
#
# Runs on Pull Requests only to preserve free-plan Actions minutes.
# Checks that every .py file changed in the PR carries a copyright header.
# Uploads audit reports as artifacts for review.

name: Copyright Audit

on:
  pull_request:
    branches:
      - main
      - 'release/**'
  workflow_dispatch:

jobs:
  copyright-audit:
    name: Copyright Header Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run copyright audit (inline)
        id: audit
        shell: bash
        run: |
          python - <<'PYEOF'
          import json
          import sys
          from pathlib import Path
          import subprocess

          # Get changed .py files in this PR
          result = subprocess.run(
              ["git", "diff", "--name-only", "--diff-filter=ACM", "origin/main...HEAD", "--", "*.py"],
              capture_output=True, text=True
          )
          changed = [p.strip() for p in result.stdout.splitlines() if p.strip()]

          if not changed:
              print("No Python files changed in this PR -- copyright audit skipped.")
              Path("reports").mkdir(exist_ok=True)
              with open("reports/copyright_audit.json", "w") as fh:
                  json.dump({"summary": {"audited": 0, "with_header": 0,
                                         "missing_header": 0, "coverage_pct": 100.0},
                             "missing": []}, fh)
              sys.exit(0)

          REQUIRED = ["Copyright", "GAIA"]
          missing = []

          for filepath in changed:
              p = Path(filepath)
              if not p.exists():
                  continue
              try:
                  lines = p.read_text(encoding="utf-8", errors="ignore").splitlines()[:10]
              except Exception:
                  missing.append({"path": filepath, "reason": "unreadable"})
                  continue
              header_text = " ".join(lines)
              if not all(kw in header_text for kw in REQUIRED):
                  missing.append({"path": filepath, "reason": "missing header"})

          audited = len(changed)
          n_missing = len(missing)
          n_with = audited - n_missing
          pct = (n_with / audited * 100) if audited else 100.0

          Path("reports").mkdir(exist_ok=True)
          with open("reports/copyright_audit.json", "w") as fh:
              json.dump({
                  "summary": {
                      "audited": audited,
                      "with_header": n_with,
                      "missing_header": n_missing,
                      "coverage_pct": pct,
                  },
                  "missing": missing,
              }, fh)

          if missing:
              print(f"FAILED: {n_missing}/{audited} changed Python files missing copyright header.")
              for f in missing:
                  print(f"  {f['path']}")
              sys.exit(1)
          else:
              print(f"PASSED: All {audited} changed Python files carry a copyright header.")
          PYEOF
        continue-on-error: true

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: copyright-audit-reports
          path: reports/
          retention-days: 30

      - name: Post PR summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'reports/copyright_audit.json';

            let body = '';

            if (fs.existsSync(path)) {
              const data = JSON.parse(fs.readFileSync(path, 'utf8'));
              const s = data.summary;
              const status = s.missing_header === 0 ? '\u2705 PASSED' : '\u274c FAILED';
              const pct = s.coverage_pct.toFixed(1);

              body = `## \U0001f50d Copyright Audit \u2014 ${status}\n\n`;
              body += `| Metric | Value |\n|--------|-------|\n`;
              body += `| Files audited | ${s.audited} |\n`;
              body += `| With header | ${s.with_header} |\n`;
              body += `| Missing header | ${s.missing_header} |\n`;
              body += `| Coverage | ${pct}% |\n\n`;

              if (s.missing_header > 0) {
                body += `### \u26a0\ufe0f Files Missing Copyright Header\n\n`;
                body += `\`\`\`\n`;
                data.missing.slice(0, 20).forEach(f => { body += `${f.path}\n`; });
                if (data.missing.length > 20) {
                  body += `\u2026 and ${data.missing.length - 20} more. See artifact for full list.\n`;
                }
                body += `\`\`\`\n\n`;
                body += `> Every changed .py file must carry a GAIA copyright header.\n`;
              } else {
                body += `All audited files carry a valid copyright header. \U0001f33f`;
              }
            } else {
              body = `## \U0001f50d Copyright Audit\n\n\u26a0\ufe0f Audit report not found.`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('Copyright Audit')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: botComment.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      - name: Enforce copyright headers
        if: steps.audit.outcome == 'failure'
        run: |
          echo ""
          echo "\u274c Copyright audit FAILED."
          echo "   One or more changed .py files are missing a copyright header."
          echo "   Required in first 10 lines: 'Copyright' and 'GAIA'"
          echo ""
          exit 1
