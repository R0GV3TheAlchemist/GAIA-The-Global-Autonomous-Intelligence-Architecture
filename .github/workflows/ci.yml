# GAIA-OS CI — runs on every push and PR targeting main
# Gate: py_compile (syntax) → pytest (correctness)
# Nothing merges to main unless this workflow is green.

name: GAIA-OS CI

on:
  push:
    branches: ["main", "sprint-g7/**", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    name: Syntax check + Pytest
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Install dependencies ─────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install project deps if requirements.txt exists, else just pytest
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pytest pytest-asyncio pytest-cov

      # ── 4. Syntax check — catch import errors before pytest ─────────────
      - name: Syntax check (py_compile)
        run: |
          python -m compileall -q core/ 2>&1 | tee /tmp/compile.log
          if grep -q 'SyntaxError\|Error' /tmp/compile.log; then
            echo '::error::Syntax errors found in core/ — fix before merging'
            exit 1
          fi
          echo '✅  All core/ files compile cleanly'

      # ── 5. Pytest ─────────────────────────────────────────────────────
      - name: Run pytest
        run: |
          python -m pytest tests/ \
            --tb=short \
            --asyncio-mode=auto \
            --cov=core \
            --cov-report=term-missing \
            -v
        env:
          PYTHONPATH: ${{ github.workspace }}
