# GAIA-OS CI — runs on every push and PR targeting main
# Gate: ruff (lint) → py_compile (syntax) → manifest-validate → pytest
# Nothing merges to main unless this workflow is green.

name: GAIA-OS CI

on:
  push:
    branches: ["main", "sprint-g7/**", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    name: Lint + Syntax + Manifest + Pytest
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Cache HuggingFace models ───────────────────────────────────────────────
      #    Prevents 429 rate-limit failures on HuggingFace Hub.
      #    Cache keyed to requirements.txt — busts only when deps change.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-all-minilm-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            huggingface-all-minilm-

      # ── 4. Install dependencies ─────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install -e ".[dev]"
          pip install pytest-cov pytest-mock

      # ── 5. Pre-download embedding model ──────────────────────────────────────────
      #    Downloads all-MiniLM-L6-v2 once before tests run.
      #    On cache hit this is a no-op (model already on disk).
      #    On cache miss this runs once and populates the cache.
      #    Skips gracefully if sentence-transformers is not installed.
      - name: Pre-download HuggingFace embedding model
        run: |
          python -c "
          try:
              from sentence_transformers import SentenceTransformer
              print('Downloading all-MiniLM-L6-v2...')
              SentenceTransformer('sentence-transformers/all-MiniLM-L6-v2')
              print('Model ready.')
          except ImportError:
              print('sentence-transformers not installed — skipping pre-download.')
          except Exception as e:
              print(f'Pre-download failed (non-fatal): {e}')
          "
        env:
          HF_HUB_DOWNLOAD_TIMEOUT: "300"
          TRANSFORMERS_OFFLINE: "0"
          SENTENCE_TRANSFORMERS_HOME: ~/.cache/huggingface/sentence_transformers

      # ── 5.5 Ruff lint ─────────────────────────────────────────────────────────────
      #    Runs BEFORE pytest so lint failures surface immediately without
      #    waiting for the full test suite. Checks core/, api/, gaia/ only —
      #    scripts/ and simulation/ are excluded (generated / research code).
      #    Config lives in pyproject.toml [tool.ruff].
      - name: Lint with ruff
        run: |
          echo '🔍  Running ruff lint...'
          ruff check core/ api/ gaia/ --output-format=github
          echo '✅  Ruff passed'

      # ── 5.6 Manifest validation ───────────────────────────────────────────────────
      #    Validates meta/CANON_MANIFEST.json before tests run.
      #    Checks: required fields, valid domain enum, no duplicate IDs,
      #    weight in [0,1], tags non-empty, every path exists on disk.
      #    Skips gracefully if meta/CANON_MANIFEST.json does not exist yet.
      - name: Validate CANON_MANIFEST.json
        run: |
          python - <<'PYEOF'
          import json, sys, os
          from pathlib import Path

          manifest_path = Path("meta/CANON_MANIFEST.json")
          if not manifest_path.exists():
              print("ℹ️  meta/CANON_MANIFEST.json not found — skipping validation (Task 2/3 not yet complete)")
              sys.exit(0)

          REQUIRED_FIELDS = {"id", "path", "title", "domain", "weight", "tags"}
          VALID_DOMAINS = {
              "identity", "governance", "cognition", "memory", "ethics",
              "consciousness", "architecture", "canon", "simulation",
              "noosphere", "soul", "security", "api", "ui", "research"
          }

          errors = []
          with open(manifest_path) as f:
              manifest = json.load(f)

          documents = manifest.get("documents", [])
          if not documents:
              print("ℹ️  No documents array found in manifest — nothing to validate.")
              sys.exit(0)

          seen_ids = {}
          for i, doc in enumerate(documents):
              loc = f"documents[{i}] (id={doc.get('id','<missing>')})"

              # Required fields
              missing = REQUIRED_FIELDS - set(doc.keys())
              if missing:
                  errors.append(f"{loc}: missing required fields: {missing}")

              # Domain enum
              domain = doc.get("domain", "")
              if domain not in VALID_DOMAINS:
                  errors.append(f"{loc}: invalid domain '{domain}'. Valid: {sorted(VALID_DOMAINS)}")

              # Duplicate ID check
              doc_id = doc.get("id")
              if doc_id:
                  if doc_id in seen_ids:
                      errors.append(f"{loc}: duplicate id '{doc_id}' (first seen at index {seen_ids[doc_id]})")
                  else:
                      seen_ids[doc_id] = i

              # Weight range
              weight = doc.get("weight")
              if weight is not None and not (0.0 <= float(weight) <= 1.0):
                  errors.append(f"{loc}: weight {weight} out of range [0.0, 1.0]")

              # Tags non-empty
              tags = doc.get("tags", [])
              if not tags:
                  errors.append(f"{loc}: tags array is empty — at least one tag required")

              # Path exists on disk
              doc_path = doc.get("path", "")
              if doc_path and not Path(doc_path).exists():
                  errors.append(f"{loc}: path '{doc_path}' does not exist on disk")

          if errors:
              print(f"❌  CANON_MANIFEST.json validation failed — {len(errors)} error(s):")
              for e in errors:
                  print(f"   • {e}")
              sys.exit(1)
          else:
              print(f"✅  CANON_MANIFEST.json valid — {len(documents)} documents, {len(seen_ids)} unique IDs")
          PYEOF

      # ── 6. Syntax check ───────────────────────────────────────────────────────────
      - name: Syntax check (py_compile)
        run: |
          python -m compileall -q core/ 2>&1 | tee /tmp/compile.log
          if grep -q 'SyntaxError\|Error' /tmp/compile.log; then
            echo '::error::Syntax errors found in core/ — fix before merging'
            exit 1
          fi
          echo '✅  All core/ files compile cleanly'

      # ── 7. Pytest ────────────────────────────────────────────────────────────────
      #    PYTHONPATH is set explicitly here AND in pyproject.toml AND in
      #    conftest.py (self-healing). Triple-redundant so no branch config
      #    drift can ever break collection again.
      - name: Run pytest
        run: |
          python -m pytest tests/ \
            --tb=short \
            --asyncio-mode=auto \
            --cov=core \
            --cov-report=term-missing \
            -v
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src-python
          CI: "true"
          HF_HUB_DOWNLOAD_TIMEOUT: "300"
          SENTENCE_TRANSFORMERS_HOME: ~/.cache/huggingface/sentence_transformers
