# =============================================================================
# GAIA Pre-Commit Hook Configuration
# =============================================================================
# Runs ruff, black, and isort automatically on every `git commit`.
# This prevents lint/formatting errors from ever reaching CI.
#
# Install once:
#   pip install pre-commit
#   pre-commit install
#
# Run manually against all files:
#   pre-commit run --all-files
#
# Update hook versions:
#   pre-commit autoupdate
# =============================================================================

repos:
  # ---------------------------------------------------------------------------
  # Ruff — fast Python linter + formatter (replaces flake8, pyupgrade, etc.)
  # Runs --fix automatically so trivial errors are auto-corrected at commit time.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # ---------------------------------------------------------------------------
  # Black — deterministic Python code formatter
  # Targets Python 3.13 to match CI runner and pyproject.toml.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args: [--target-version, py313]
        language_version: python3.13

  # ---------------------------------------------------------------------------
  # isort — import statement organiser (black-compatible profile)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile, black]

  # ---------------------------------------------------------------------------
  # General hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: debug-statements
